spring:
  main:
    web-application-type: servlet
  application:
    name: talki_spring
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      file-size-threshold: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/talki?serverTimezone=Asia/Seoul
    username: talki
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

fastapi:
  url: http://localhost:8000

cloud:
  aws:
    region:
      static: ap-northeast-2
    s3:
      bucket: talki-recordings